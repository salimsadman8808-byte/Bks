<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salami Poster Maker - Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background: #fdf2f8; padding: 20px; }
        .control-panel { background: white; padding: 25px; border-radius: 15px; display: inline-block; box-shadow: 0 8px 20px rgba(216,32,112,0.1); max-width: 400px; width: 100%; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        .make-btn { background: #d82070; color: white; padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        canvas { border: 2px solid #d82070; border-radius: 12px; max-width: 100%; height: auto; display: none; margin-top: 20px; }
        #qrcode-temp { display: none; }
    </style>
</head>
<body>

    <div class="control-panel">
        <h2 style="color: #d82070;">বিকাশ সেলামি পোস্টার</h2>
        <input type="text" id="numInput" placeholder="বিকাশ নম্বর লিখুন">
        <input type="file" id="imgFile" accept="image/*">
        <button class="make-btn" onclick="generatePoster()">পোস্টার তৈরি করুন</button>
    </div>

    <div id="qrcode-temp"></div>
    <canvas id="posterCanvas"></canvas>

    <script>
        function generatePoster() {
            const canvas = document.getElementById('posterCanvas');
            const ctx = canvas.getContext('2d');
            const number = document.getElementById('numInput').value;
            const fileInput = document.getElementById('imgFile');

            if (!number || !fileInput.files[0]) {
                alert("নম্বর এবং ছবি দুটোই দিন!");
                return;
            }

            // ১. কিউআর কোড তৈরি
            document.getElementById('qrcode-temp').innerHTML = "";
            new QRCode(document.getElementById("qrcode-temp"), {
                text: `bKash://qr?m=${number}`,
                width: 256,
                height: 256,
                colorDark : "#d82070",
                colorLight : "#ffffff"
            });

            const baseImg = new Image();
            // এই লাইনে আপনার ইমেজ ফাইলের নাম ঠিক আছে কিনা চেক করুন
            baseImg.src = 'base_design.jpg'; 

            baseImg.onload = function() {
                canvas.width = baseImg.width;
                canvas.height = baseImg.height;
                ctx.drawImage(baseImg, 0, 0);

                // ২. ইউজার ছবি ড্র করা
                const reader = new FileReader();
                reader.onload = function(e) {
                    const userImg = new Image();
                    userImg.onload = function() {
                        // ছবির পজিশন (আপনার ডিজাইন অনুযায়ী অ্যাডজাস্ট করুন)
                        ctx.drawImage(userImg, 645, 220, 340, 470);

                        // ৩. কিউআর কোড ড্র করা
                        setTimeout(() => {
                            const qrImgElement = document.querySelector('#qrcode-temp img');
                            if (qrImgElement) {
                                ctx.drawImage(qrImgElement, 90, 515, 185, 185);
                                
                                // ৪. নম্বর লেখা
                                ctx.fillStyle = "#d82070";
                                ctx.font = "bold 32px Arial";
                                ctx.textAlign = "center";
                                ctx.fillText(number, 182, 755);

                                canvas.style.display = "block";
                            }
                        }, 200);
                    };
                    userImg.src = e.target.result;
                };
                reader.readAsDataURL(fileInput.files[0]);
            };

            baseImg.onerror = function() {
                alert("base_design.jpg ফাইলটি পাওয়া যায়নি! নিশ্চিত করুন ফাইলটি index.html এর পাশেই আছে।");
            };
        }
    </script>
</body>
</html>
